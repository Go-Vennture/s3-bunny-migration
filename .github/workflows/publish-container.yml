name: Publish container

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  BUNNY_MC_APP_ID: ${{ vars.BUNNY_MC_APP_ID }}
  BUNNY_MC_CONTAINER: ${{ vars.BUNNY_MC_CONTAINER }}
  BUNNYNET_API_KEY: ${{ secrets.BUNNYNET_API_KEY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Bunny Magic Containers image
        if: ${{ env.BUNNY_MC_APP_ID != '' && env.BUNNY_MC_CONTAINER != '' && env.BUNNYNET_API_KEY != '' }}
        uses: BunnyWay/actions/container-update-image@main
        with:
          app_id: ${{ env.BUNNY_MC_APP_ID }}
          api_key: ${{ env.BUNNYNET_API_KEY }}
          container: ${{ env.BUNNY_MC_CONTAINER }}
          image_tag: ${{ github.sha }}
